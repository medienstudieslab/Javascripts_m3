<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="wordInput" placeholder="Напиши слово и нажми Enter" />

    <div
      id="field"
      style="
        position: relative;
        width: 100%;
        height: 200px;
        border: 1px solid #ccc;
        margin-top: 20px;
        font-size: 40px;
      "
    ></div>

    <script>
      const input = document.getElementById("wordInput");
      const field = document.getElementById("field");

      function renderWord() {
        field.innerHTML = "";

        const letters = input.value.split("");

        letters.forEach((letter) => {
          const span = document.createElement("span");
          span.textContent = letter;
          span.style.display = "inline-block";
          span.style.transition = "transform 0.6s ease-out, opacity 0.6s";

          span.addEventListener("mouseenter", () => {
            const angle = Math.random() * Math.PI * 2;
            const distance = 150 + Math.random() * 200;

            const x = Math.cos(angle) * distance;
            const y = Math.sin(angle) * distance;

            span.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
            span.style.opacity = 0;
          });

          field.appendChild(span);
        });
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") renderWord();
      });
    </script>
  </body>
</html>
