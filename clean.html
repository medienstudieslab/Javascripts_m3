<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="wrapper">
      <img src="images/i.jpeg" class="backgr" />
      <canvas id="glass"></canvas>
    </div>

    <style>
      body {
        margin: 0;
        overflow: hidden;
      }

      .wrapper {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .backgr {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #glass {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(200, 200, 200, 0.7);
        backdrop-filter: blur(4px);
      }
    </style>
    <script>
      let canvas = document.getElementById("glass");
      let glass = canvas.getContext("2d");

      function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        // заливка
        glass.fillStyle = "rgba(200,200,200,0.9)";
        glass.fillRect(0, 0, canvas.width, canvas.height);
      }
      resize();
      window.addEventListener("resize", resize);

      let finger = false;
      let lastX = 0;
      let lastY = 0;

      canvas.addEventListener("mousedown", (e) => {
        finger = true;
        lastX = e.offsetX;
        lastY = e.offsetY;
      });

      canvas.addEventListener("mouseup", () => (finger = false));
      canvas.addEventListener("mouseleave", () => (finger = false));

      canvas.addEventListener("mousemove", (e) => {
        if (!finger) return;

        let x = e.offsetX;
        let y = e.offsetY;

        glass.globalCompositeOperation = "destination-out";
        glass.lineWidth = 50;
        glass.lineCap = "round";
        glass.lineJoin = "round";

        glass.beginPath();
        glass.moveTo(lastX, lastY);
        glass.lineTo(x, y);
        glass.stroke();

        glass.globalCompositeOperation = "source-over";

        lastX = x;
        lastY = y;
      });
    </script>
  </body>
</html>
