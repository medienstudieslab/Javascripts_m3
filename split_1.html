<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <input id="wordInput" placeholder="Напиши слово / предложение" />
    <span>и нажми Enter</span>
    <div
      id="field"
      style="
        position: relative;
        width: 100%;
        height: 90vh;
        border: 1px solid #ccc;
        margin-top: 20px;
      "
    ></div>

    <script>
      const input = document.getElementById("wordInput");
      const field = document.getElementById("field");

      function scatter() {
        field.innerHTML = "";

        const letters = input.value.split(" ");

        letters.forEach((word) => {
          const span = document.createElement("span");
          span.textContent = word;
          span.style.position = "absolute";
          span.style.fontSize = "32px";

          const x = Math.random() * (field.clientWidth - 30);
          const y = Math.random() * (field.clientHeight - 30);

          span.style.left = x + "px";
          span.style.top = y + "px";

          field.appendChild(span);
        });
      }

      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          scatter();
        }
      });
    </script>
  </body>
</html>
