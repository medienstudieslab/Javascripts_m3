<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <title>растущий рандомного цвета круг</title>
  </head>
  <body>
    <script>
      let points = [];

      function setup() {
        createCanvas(windowWidth, windowHeight);

        for (let i = 0; i < 40; i++) {
          let side = floor(random(4));

          if (side === 0) points.push({ x: random(width), y: 0 }); // верх
          if (side === 1) points.push({ x: random(width), y: height }); // низ
          if (side === 2) points.push({ x: 0, y: random(height) }); // слева
          if (side === 3) points.push({ x: width, y: random(height) }); // справа
        }
      }

      function draw() {
        background(0);

        stroke(255);
        strokeWeight(1);

        for (let p of points) {
          line(p.x, p.y, mouseX, mouseY);
        }
      }
    </script>
  </body>
</html>
